<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOC Agent Queue – Fold Health</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Apply theme BEFORE first paint to prevent flash-of-wrong-theme.
      // Default is 'light' — system preference is honored only if the user
      // has explicitly chosen 'system' in the in-app theme picker.
      (function () {
        try {
          var stored = localStorage.getItem('theme') || 'light';
          var resolved = stored;
          if (stored === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', resolved);
          if (resolved === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage unavailable (private mode, etc.) — fall back to light.
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
